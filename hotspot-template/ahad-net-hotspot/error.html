<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAD WiFi ZONE - Error</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            font-size: 28px;
            color: #1e3c72;
            font-weight: 700;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #f44336;
            border-radius: 50%;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon::after {
            content: "X";
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
        }
        .help-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 25px;
            color: #888;
            font-size: 12px;
        }
        .footer a {
            color: #1e3c72;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AHAD WiFi ZONE</h1>
        </div>

        <div class="error-icon"></div>

        <h2>Connection Error</h2>

        <div class="error-message">
            $(error-orig)
        </div>

        <p class="help-text">
            Please check your credentials and try again.<br>
            If the problem persists, contact support.
        </p>

        <a href="$(link-login)" class="btn">Try Again</a>

        <div class="footer">
            <p><a href="tel:+880XXXXXXXXXX">Contact Support</a></p>
        </div>
    </div>
</body>
</html>
