<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHAD WiFi ZONE - Logged Out</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            font-size: 28px;
            color: #1e3c72;
            font-weight: 700;
        }
        .logout-icon {
            width: 80px;
            height: 80px;
            background: #FF9800;
            border-radius: 50%;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-icon::after {
            content: "!";
            color: white;
            font-size: 40px;
            font-weight: bold;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-row span:first-child {
            color: #888;
        }
        .info-row span:last-child {
            color: #333;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 25px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AHAD WiFi ZONE</h1>
        </div>

        <div class="logout-icon"></div>

        <h2>Session Ended</h2>
        <p>You have been logged out successfully</p>

        <div class="info">
            <div class="info-row">
                <span>Session Duration</span>
                <span>$(uptime)</span>
            </div>
            <div class="info-row">
                <span>Data Downloaded</span>
                <span>$(bytes-in-nice)</span>
            </div>
            <div class="info-row">
                <span>Data Uploaded</span>
                <span>$(bytes-out-nice)</span>
            </div>
        </div>

        <a href="$(link-login)" class="btn">Login Again</a>

        <div class="footer">
            <p>Thank you for using AHAD WiFi ZONE</p>
        </div>
    </div>
</body>
</html>
