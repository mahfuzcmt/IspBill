<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="60">
    <title>AHAD WiFi ZONE - Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo h1 {
            font-size: 28px;
            color: #1e3c72;
            font-weight: 700;
        }
        .status-icon {
            width: 80px;
            height: 80px;
            background: #2196F3;
            border-radius: 50%;
            margin: 25px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }
        .status-icon::after {
            content: "WiFi";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        h2 {
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 15px;
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-row span:first-child {
            color: #888;
            font-size: 14px;
        }
        .info-row span:last-child {
            color: #333;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin: 5px;
            cursor: pointer;
        }
        .btn-logout {
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%);
        }
        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>AHAD WiFi ZONE</h1>
        </div>

        <div class="status-icon"></div>

        <h2>Connection Status</h2>
        <p>Welcome, $(username)</p>

        <div class="info">
            <div class="info-row">
                <span>IP Address</span>
                <span>$(ip)</span>
            </div>
            <div class="info-row">
                <span>MAC Address</span>
                <span>$(mac)</span>
            </div>
            <div class="info-row">
                <span>Connected For</span>
                <span>$(uptime)</span>
            </div>
            <div class="info-row">
                <span>Time Left</span>
                <span>$(session-time-left)</span>
            </div>
            <div class="info-row">
                <span>Downloaded</span>
                <span>$(bytes-in-nice)</span>
            </div>
            <div class="info-row">
                <span>Uploaded</span>
                <span>$(bytes-out-nice)</span>
            </div>
        </div>

        <a href="$(link-refresh)" class="btn">Refresh</a>
        <a href="$(link-logout)" class="btn btn-logout">Logout</a>

        <div class="footer">
            <p>Page auto-refreshes every 60 seconds</p>
        </div>
    </div>
</body>
</html>
