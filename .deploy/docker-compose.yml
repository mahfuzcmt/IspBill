services:
  nuxbill-db:
    image: mariadb:10.11
    container_name: phpnuxbill-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: phpnuxbill
      MARIADB_USER: phpnuxbill
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db-data:```/var/lib/mysql
    networks:
      - nuxbill-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  nuxbill-app:
    build:
      context: ..
      dockerfile: .deploy/Dockerfile
    image: ispbill-app:local
    container_name: phpnuxbill-app
    restart: unless-stopped
    depends_on:
      nuxbill-db:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./app-data:/var/www/html/system/uploads
    networks:
      - nuxbill-net

  # Runs traffic-poller.php every 60s to populate tbl_traffic_samples
  # and tbl_wan_samples. Reuses the app image (same code + config.php).
  nuxbill-cron:
    image: ispbill-app:local
    container_name: phpnuxbill-cron
    restart: unless-stopped
    depends_on:
      nuxbill-app:
        condition: service_started
      nuxbill-db:
        condition: service_healthy
    command: >
      sh -c "while true; do
        php /var/www/html/system/traffic-poller.php || echo poller-exit=$$?;
        sleep 60;
      done"
    volumes:
      - ./app-data:/var/www/html/system/uploads
    networks:
      - nuxbill-net

networks:
  nuxbill-net:
    driver: bridge
