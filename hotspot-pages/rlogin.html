<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>পুনরায় সংযোগ - AHAD WiFi Zone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Bengali','Hind Siliguri',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
.box{background:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.3);width:100%;max-width:380px;overflow:hidden}
.head{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:20px;text-align:center;color:#fff}
.head h1{font-size:22px;margin-bottom:5px}
.head p{font-size:13px;opacity:0.8}
.content{padding:25px}
.msg{background:#fff3cd;color:#856404;padding:12px;border-radius:10px;margin-bottom:20px;font-size:13px;border-left:4px solid #ffc107;text-align:center}
.info{background:#f8f9fa;border-radius:10px;padding:15px;margin-bottom:20px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #ddd;font-size:13px}
.row:last-child{border:none}
.row span:first-child{color:#666}
.row span:last-child{font-weight:600;color:#2d3436}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none;border-radius:10px;font-weight:600;font-size:16px;text-align:center;border:none;cursor:pointer}
.foot{padding:12px;background:#f8f9fa;font-size:11px;color:#636e72;text-align:center}
</style>
</head>
<body>
<div class="box">
<div class="head">
<h1>AHAD WiFi Zone</h1>
<p>ইন্টারনেট সেবায় স্বাগতম</p>
</div>
<div class="content">
<div class="msg">আপনার সেশন চলছে, পুনরায় সংযোগ হচ্ছে...</div>
<div class="info">
<div class="row"><span>ব্যবহারকারী</span><span>$(username)</span></div>
<div class="row"><span>আইপি ঠিকানা</span><span>$(ip)</span></div>
</div>
<form action="$(link-login-only)" method="post">
<input type="hidden" name="username" value="$(username)">
<input type="hidden" name="password" value="$(password)">
<input type="hidden" name="dst" value="$(link-orig)">
<button type="submit" class="btn">পুনরায় সংযোগ করুন</button>
</form>
</div>
<div class="foot">Powered by AHAD Network | আহাদ নেটওয়ার্ক<br><span style="font-size:12px;color:#667eea">০১৯৭৫ ৫৮ ৫৯ ৬০</span></div>
</div>
</body>
</html>
