<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="refresh" content="0;url=$(link-redirect)">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>রিডাইরেক্ট - AHAD WiFi Zone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Bengali','Hind Siliguri',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.3);width:100%;max-width:350px;text-align:center;padding:40px}
.spinner{width:50px;height:50px;border:4px solid #f0f0f0;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.msg{font-size:16px;color:#2d3436;margin-bottom:10px}
.link{font-size:12px;color:#667eea}
</style>
</head>
<body>
<div class="box">
<div class="spinner"></div>
<div class="msg">রিডাইরেক্ট হচ্ছে...</div>
<a href="$(link-redirect)" class="link">ক্লিক করুন যদি স্বয়ংক্রিয়ভাবে না যায়</a>
</div>
</body>
</html>
