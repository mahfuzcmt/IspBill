<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>সংযোগ সফল - AHAD WiFi Zone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Bengali','Hind Siliguri',sans-serif;background:linear-gradient(135deg,#00b894 0%,#00cec9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
.box{background:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,0.3);width:100%;max-width:380px;overflow:hidden}
.head{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:20px;text-align:center;color:#fff}
.head h1{font-size:22px;margin-bottom:5px}
.head p{font-size:13px;opacity:0.8}
.content{padding:25px;text-align:center}
.icon{width:80px;height:80px;background:linear-gradient(135deg,#00b894 0%,#00cec9 100%);border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px}
.msg{font-size:20px;color:#00b894;margin-bottom:10px;font-weight:600}
.sub{color:#636e72;font-size:14px;margin-bottom:20px}
.info{background:#f8f9fa;border-radius:10px;padding:15px;text-align:left;margin-bottom:20px}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #ddd;font-size:13px}
.row:last-child{border:none}
.row span:first-child{color:#666}
.row span:last-child{font-weight:600;color:#2d3436}
.btn{display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none;border-radius:10px;font-weight:600;font-size:16px}
.note{margin-top:15px;font-size:12px;color:#00b894}
.foot{padding:12px;background:#f8f9fa;font-size:11px;color:#636e72;text-align:center}
</style>
</head>
<body>
<div class="box">
<div class="head">
<h1>AHAD WiFi Zone</h1>
<p>ইন্টারনেট সেবায় স্বাগতম</p>
</div>
<div class="content">
<div class="icon" style="color:#fff;font-size:50px;font-weight:bold">OK</div>
<div class="msg">সংযোগ সফল হয়েছে!</div>
<div class="sub">ইন্টারনেট উপভোগ করুন</div>
<div class="info">
<div class="row"><span>ব্যবহারকারী</span><span>$(username)</span></div>
<div class="row"><span>আইপি ঠিকানা</span><span>$(ip)</span></div>
<div class="row"><span>অবশিষ্ট সময়</span><span>$(session-time-left)</span></div>
</div>
<a href="$(link-redirect)" class="btn">ব্রাউজিং শুরু করুন</a>
<p class="note">এই উইন্ডো বন্ধ করে ইন্টারনেট ব্যবহার করুন!</p>
</div>
<div class="foot">Powered by AHAD Network | আহাদ নেটওয়ার্ক<br><span style="font-size:12px;color:#00b894">০১৯৭৫ ৫৮ ৫৯ ৬০</span></div>
</div>
<script>setTimeout(function(){try{window.close()}catch(e){}},2000);</script>
</body>
</html>
