# NetPulse walled-garden vhost — REPLACE the existing :8089 server block
# in /opt/phpnuxbill/router-proxy/nginx.conf with this one.
#
# Behaviour:
#   - Recognises OS captive-portal probe URLs (Apple, Android, Windows,
#     Firefox, GNOME). For each, returns HTTP 302 to /notice. This is what
#     triggers the native "Sign in to Wi-Fi Network" banner on the device.
#   - All other URLs return 302 to /notice as well.
#   - /notice (and /index.php?_route=notice/...) is proxied to the IspBill
#     PHP app on the host's :8081, preserving the customer's IP in
#     X-Real-IP so notice.php can resolve their PPPoE username from
#     Mikrotik /ppp/active.

server {
    listen 10.99.0.1:8089 default_server;
    server_name _;

    # Hard no-cache — the page changes the moment the customer recharges
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Referrer-Policy "no-referrer" always;

    # Tight body / connection limits — this server only ever serves redirects
    # and the notice page; we don't accept uploads, websockets, or long polls.
    client_max_body_size 16k;
    client_body_timeout  5s;
    client_header_timeout 5s;
    keepalive_timeout    15s;

    # ------------------------------------------------------------------
    # OS captive-portal probe URLs.
    # Each OS hits one of these over HTTP when it joins a network. If the
    # response is anything other than the expected magic string, the OS
    # decides "captive portal detected" and pops the sign-in banner that
    # opens the redirect URL in a sandboxed in-OS browser.
    # ------------------------------------------------------------------

    # Apple CNA  (iOS, iPadOS, macOS)
    #   Expects:  <HTML><HEAD><TITLE>Success</TITLE>...
    #   Domains:  captive.apple.com, www.apple.com/library/test/success.html
    location = /hotspot-detect.html {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /library/test/success.html {
        return 302 http://10.99.0.1:8089/notice;
    }

    # Android  (Google connectivity check)
    #   Expects:  HTTP 204
    #   Domains:  connectivitycheck.gstatic.com, www.google.com,
    #             clients3.google.com, android.clients.google.com
    location = /generate_204 {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /gen_204 {
        return 302 http://10.99.0.1:8089/notice;
    }

    # Windows NCSI  (Network Connection Status Indicator)
    #   Expects:  body "Microsoft Connect Test" (or "Microsoft NCSI")
    #   Domains:  www.msftconnecttest.com, www.msftncsi.com
    location = /connecttest.txt {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /ncsi.txt {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /redirect {
        return 302 http://10.99.0.1:8089/notice;
    }

    # Firefox  (independent of OS — Firefox has its own captive-portal probe)
    #   Expects:  body "success\n"
    #   Domain:   detectportal.firefox.com
    location = /success.txt {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /canonical.html {
        return 302 http://10.99.0.1:8089/notice;
    }

    # GNOME / NetworkManager
    #   Expects:  body "NetworkManager is online"
    location = /check_network_status.txt {
        return 302 http://10.99.0.1:8089/notice;
    }
    location = /nm-check.txt {
        return 302 http://10.99.0.1:8089/notice;
    }

    # KDE
    location = /kde-connect/v2 {
        return 302 http://10.99.0.1:8089/notice;
    }

    # ------------------------------------------------------------------
    # /notice  → proxy to IspBill PHP app on :8081
    # The IspBill route is /index.php?_route=notice — we accept both the
    # short alias /notice and the full route for clarity.
    # ------------------------------------------------------------------
    location = /notice {
        proxy_pass http://127.0.0.1:8081/index.php?_route=notice;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location ~ ^/index\.php$ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # Pass through assets the notice page references (logo, favicon, fonts
    # are loaded from Google so no proxy needed for those).
    location ~ ^/ui/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Cache static UI assets briefly to take load off the PHP app
        expires 5m;
        add_header Cache-Control "public, max-age=300" always;
    }

    # ------------------------------------------------------------------
    # Default: redirect any other URL to the notice page.
    # Examples this catches:  /, /index.html, /favicon.ico, /robots.txt,
    # whatever the user originally typed (Host: example.com → "/").
    # ------------------------------------------------------------------
    location / {
        return 302 http://10.99.0.1:8089/notice;
    }
}
