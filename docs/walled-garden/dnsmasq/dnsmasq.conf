# NetPulse walled-garden DNS sinkhole.
#
# Returns 10.99.0.1 (the notice nginx) for every A query that arrives
# on the WireGuard interface. Mikrotik DNAT-redirects expired-users'
# port 53 traffic to this resolver.

# === BINDING ===
# Bind ONLY to the WireGuard-side IP so we don't conflict with
# systemd-resolved on 127.0.0.53.
listen-address=10.99.0.1
bind-interfaces

# Don't try to be a recursive resolver.
no-resolv
no-hosts
no-poll

# === SINKHOLE ===
# Wildcard '#' matches any domain not explicitly defined below.
# For AAAA (IPv6) queries on the same names, dnsmasq returns NODATA
# automatically, so clients fall back to the A record (10.99.0.1).
address=/#/10.99.0.1

# === FIREFOX DoH OPT-OUT ===
# If Firefox receives NXDOMAIN for this canary domain, it disables
# DNS-over-HTTPS for the current network — so our sinkhole catches
# its DNS too instead of being bypassed via Cloudflare.
address=/use-application-dns.net/

# === LOGGING ===
# Useful while validating the rollout. Set log-queries=extra for more
# detail; turn off once stable to save disk.
log-queries
log-facility=-

# === CACHE ===
# Small cache (sinkhole answers are uniform; we don't need much).
cache-size=1000
