# NetPulse customer DNS resolver — recursive with query logging.
#
# Sits on 10.99.0.1:5454 (NOT port 53 — that belongs to the walled-garden
# sinkhole). Mikrotik DNATs all PPPoE customer DNS traffic here. Every
# query is written to stdout, which docker's json-file log driver
# persists and rotates (configured in compose-additions.yml).

# =====================================================================
# BIND
# =====================================================================
# Bind only to the WireGuard interface IP, port 5454, so we don't
# collide with the existing sinkhole (10.99.0.1:53) or the host's
# systemd-resolved (127.0.0.53:53).
listen-address=10.99.0.1
port=5454
bind-interfaces

# =====================================================================
# UPSTREAM RESOLVERS
# =====================================================================
# Recursive — forward queries to public resolvers. Don't read
# /etc/resolv.conf; we want deterministic upstream choice.
no-resolv
no-hosts
no-poll

# Cloudflare + Google + Quad9. dnsmasq queries all servers in parallel
# and uses the first response (all-servers below).
server=1.1.1.1
server=1.0.0.1
server=8.8.8.8
server=8.8.4.4
server=9.9.9.9

all-servers
edns-packet-size=1232

# =====================================================================
# CACHE
# =====================================================================
# Larger cache for an ISP-scale resolver. ~10k entries fits comfortably
# in memory and cuts upstream load by ~80% for typical browsing.
cache-size=10000

# Negative caching — remember NXDOMAINs for a while too
neg-ttl=300

# =====================================================================
# LOGGING — the whole point of this resolver
# =====================================================================
# Every query lands on stdout, prefixed with timestamp + client IP.
# Docker's json-file driver picks it up; lookup-dns.sh greps it.
log-queries
log-facility=-

# Don't log the cache hits separately — too noisy. Just the upstream
# resolution events (which still tell us "client X asked for Y at T").
# log-async=20    # uncomment if logging becomes a hot path

# =====================================================================
# SECURITY HARDENING
# =====================================================================
# Don't answer queries from anything except our DNAT-forwarded customers.
# bind-interfaces above already restricts to 10.99.0.1, but be explicit:
# only accept queries that arrived via the wg0 interface.
# (If your WG interface has a different name, adjust accordingly.)
# interface=wg0
# except-interface=lo

# Don't reveal our hostname / version to query probes
dns-forward-max=300
stop-dns-rebind
rebind-localhost-ok
