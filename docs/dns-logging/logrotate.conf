# Install on the VPS at /etc/logrotate.d/dnsmasq-resolver
#
# Rotates the dnsmasq query log daily, keeps 7 rotations (≈7 days),
# compresses everything older than the current rotation. Uses
# `copytruncate` so the inode dnsmasq has open stays valid — no need
# to send SIGHUP to the container.
#
# After installing, test with:
#   logrotate -d /etc/logrotate.d/dnsmasq-resolver       # debug (no changes)
#   logrotate -f /etc/logrotate.d/dnsmasq-resolver       # force rotate now

/opt/phpnuxbill/dnsmasq-resolver/logs/queries.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    su root root
    create 0644 root root

    # Optional: post-rotate hook to record rotation timestamps somewhere
    # useful if you ever need to prove a chain-of-custody for BTRC.
    # postrotate
    #     date -u +"%Y-%m-%dT%H:%M:%SZ rotated dnsmasq-resolver queries.log" \
    #         >> /var/log/dnsmasq-rotations.log
    # endscript
}
