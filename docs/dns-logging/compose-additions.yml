# Splice this service into /opt/phpnuxbill/docker-compose.yml under `services:`.
#
# Runs alongside the existing walled-garden dnsmasq (which sinkholes
# expired users on port 53). This one is the recursive resolver +
# query logger on port 5454.
#
# Log retention: docker's json-file driver rotates at 100MB × 7 files
# = up to 700MB held (about 7 days for a small ISP). The lookup-dns.sh
# script in scripts/ reads logs via `docker logs` — no log-mount needed.

  dnsmasq-resolver:
    build:
      context: ./dnsmasq-resolver
      dockerfile: Dockerfile
    container_name: dnsmasq-resolver
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./dnsmasq-resolver/dnsmasq.conf:/etc/dnsmasq.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "7"
        # Optional: tag each log line for easier filtering downstream
        tag: "dnsmasq-resolver"
    healthcheck:
      test: ["CMD-SHELL", "nslookup -port=5454 example.com 10.99.0.1 | grep -q Address"]
      interval: 60s
      timeout: 5s
      retries: 3
