# Splice this service into /opt/phpnuxbill/docker-compose.yml under `services:`.
# Plus the small `volumes:` addition to the existing `phpnuxbill-app` service
# (commented at the bottom) — that's what gives the admin UI tab read access
# to the query log.
#
# Runs alongside the existing walled-garden dnsmasq (which sinkholes
# expired users on port 53). This one is the recursive resolver +
# query logger on port 5454.
#
# Log retention: dnsmasq writes one growing file, logrotate (on the
# HOST, not in the container) rotates it daily with copytruncate so the
# inode stays stable for the running dnsmasq. Config at
# logrotate.conf in this patch directory — install at
# /etc/logrotate.d/dnsmasq-resolver

  dnsmasq-resolver:
    build:
      context: ./dnsmasq-resolver
      dockerfile: Dockerfile
    container_name: dnsmasq-resolver
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./dnsmasq-resolver/dnsmasq.conf:/etc/dnsmasq.conf:ro
      - ./dnsmasq-resolver/logs:/var/log/dnsmasq:rw
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "dnsmasq-resolver"
    healthcheck:
      test: ["CMD-SHELL", "nslookup -port=5454 example.com 10.99.0.1 | grep -q Address"]
      interval: 60s
      timeout: 5s
      retries: 3

# ============================================================================
# ALSO add this read-only volume mount to the EXISTING `phpnuxbill-app` service
# (don't replace the service — just append the line under its `volumes:` block):
# ============================================================================
#
#   phpnuxbill-app:
#     ...
#     volumes:
#       - ./overrides/...                                          # (existing)
#       - ./dnsmasq-resolver/logs:/var/log/dnsmasq:ro              # ← ADD THIS
#
# Read-only is important: the PHP app should never be able to modify or delete
# query logs (BTRC integrity expectation).
