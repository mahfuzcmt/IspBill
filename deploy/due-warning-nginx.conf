# Due Warning Nginx Configuration
# Add this server block to /opt/phpnuxbill/router-proxy/nginx.conf

# Server for due warning notices (port 8089)
server {
    listen 8089;
    server_name _;

    # Redirect all HTTP requests to the due-notice controller
    location / {
        # Capture the original URL the user was trying to access
        set $original_url $scheme://$host$request_uri;

        # Proxy to phpnuxbill due-notice controller
        proxy_pass http://phpnuxbill:80/index.php?_route=due-notice&url=$original_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Original-URL $original_url;
    }
}
